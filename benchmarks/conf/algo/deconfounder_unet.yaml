# Template for deconfounder + unet. Variants are selected by algo name,
# e.g. deconfounder_r1_unet_8 or deconfounder_r2_nbr2_unet_2. The Snakefile
# parses the name into overrides for method.radius, method.encoder_conv2,
# (optional) method.nbr_treatment_radius, and the unet_base_chan search
# space (which widens to include 64 when encoder_conv2=64).
needs_train_test_split: false
use_interference: true

method:
  _target_: sci.algorithms.Deconfounder
  kernel_size: 3
  # Required; populated from the algo name by the Snakefile.
  radius: ???
  encoder_conv2: ???
  nbr_treatment_radius: null
  connectivity: 8
  encoder_pool: max
  lr_cvae: 1e-3
  beta_epoch_max: 5
  epochs_cvae: 30
  encoder_conv1: 64
  # unet kwargs
  head: unet
  epochs_head: 30
  lr_head: 1e-3
  bilinear: false


tune:
  param_space:
    weight_decay_cvae:
      _target_: ray.tune.uniform
      _args_: [1e-4, 1e-3]
    weight_decay_head:
      _target_: ray.tune.uniform
      _args_: [1e-4, 1e-3]
    beta_max:
      _target_: ray.tune.loguniform
      _args_: [1e-3, 1]
    unet_base_chan:
      _target_: ray.tune.choice
      _args_:
        - [16, 32]
